# ---------------------------------------------------------------------------
# Database configuration.
# Every value is supplied at runtime by Kubernetes:
#   - DB_HOST, DB_PORT, DB_NAME, DB_USER  come from a ConfigMap
#   - DB_PASSWORD                         comes from a Secret
# Nothing sensitive or environment-specific is hardcoded here.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# The schema and data are owned by db/init/seed.sql, so the app never alters it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------------------------------
# HikariCP connection pool (best-practice connection pooling).
# Sized small per pod because we run 4+ replicas and scale horizontally.
# ---------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=60000

# ---------------------------------------------------------------------------
# Actuator: dedicated liveness/readiness probe groups for Kubernetes.
# Readiness only reports UP once the DB connection is usable, which makes
# rolling updates safe (no traffic to a pod that cannot reach the DB yet).
# ---------------------------------------------------------------------------
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoints.web.exposure.include=health,info,metrics
