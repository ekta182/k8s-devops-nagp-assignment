# Headless service governing the StatefulSet. clusterIP: None gives the pod a
# stable DNS name (mysql-0.mysql) and the service name "mysql" resolves to it.
# No external exposure — the DB is reachable only inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: finops
  labels:
    app: mysql
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
