# NOTE: These are base64-encoded sample values for the assignment, NOT real
# production credentials. Passwords are never written in plain text in any YAML
# that runs in the cluster — pods read them from this Secret via secretKeyRef.
#
# To generate your own:   echo -n 'YourPassword' | base64
#   root password  = RootPass123!   -> Um9vdFBhc3MxMjMh
#   app  password  = AppPass123!     -> QXBwUGFzczEyMyE=
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: finops
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: Um9vdFBhc3MxMjMh
  MYSQL_PASSWORD: QXBwUGFzczEyMyE=
