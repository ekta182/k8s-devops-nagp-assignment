# Service/API tier Deployment:
#  - 4 replicas (per requirements; also the HPA floor)
#  - RollingUpdate strategy with maxUnavailable 0 so there is zero downtime
#  - Liveness + readiness probes against Spring Actuator => self-healing and
#    safe rollouts (no traffic until the pod can reach the DB)
#  - CPU/memory requests AND limits defined (FinOps requirement)
#  - All DB config from ConfigMap; password from Secret; no plain-text secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: finops
  labels:
    app: api
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Replace <your-dockerhub-user> with your Docker Hub namespace
          image: ekta182/k8s-finops-api:1.0.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config        # DB_HOST, DB_PORT, DB_NAME, DB_USER
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
